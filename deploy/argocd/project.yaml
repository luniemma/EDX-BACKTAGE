apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: backend-api
  namespace: argocd
spec:
  description: backend-api service across environments
  sourceRepos:
    - https://github.com/your-org/backend-api.git
  destinations:
    - namespace: backend-api-*
      server: https://kubernetes.default.svc
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
  namespaceResourceWhitelist:
    - group: "*"
      kind: "*"
  orphanedResources:
    warn: true
