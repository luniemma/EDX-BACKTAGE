replicaCount: 1
image:
  tag: "sha-1468cc0"
env:
  # Backstage always ships a production bundle; NODE_ENV=development breaks it.
  NODE_ENV: production
  NODE_OPTIONS: "--no-node-snapshot"
  LOG_LEVEL: debug
  POSTGRES_PORT: "5432"
  # The browser uses these verbatim, so they must match exactly how it reaches
  # the portal — scheme, host AND port. The :8443 is the local port-forward to
  # the ingress controller (see deploy/tls-local/README.md); without the port
  # here the frontend calls :443 and every API request fails.
  # <name>.127.0.0.1.nip.io is public wildcard DNS resolving to 127.0.0.1, so
  # no hosts-file entry (and no Administrator) is needed.
  APP_BASE_URL: "https://backstage.127.0.0.1.nip.io:8443"
  BACKEND_BASE_URL: "https://backstage.127.0.0.1.nip.io:8443"
ingress:
  enabled: true
  hosts:
    - host: backstage.127.0.0.1.nip.io
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: backstage-tls   # created by cert-manager, see deploy/tls-local
      hosts:
        - backstage.127.0.0.1.nip.io
autoscaling:
  enabled: false
podDisruptionBudget:
  enabled: false
# Bring up an in-cluster Postgres for dev — no external DB needed.
postgres:
  enabled: true
  persistence:
    size: 2Gi
secrets:
  # Must match postgres.auth.password when using the in-cluster database.
  postgresPassword: "postgres"
  backendSecret: "dev-only-not-a-real-secret-please-rotate"
