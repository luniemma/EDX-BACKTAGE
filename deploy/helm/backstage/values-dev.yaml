replicaCount: 1
image:
  tag: "sha-1468cc0"
env:
  # Backstage always ships a production bundle; NODE_ENV=development breaks it.
  NODE_ENV: production
  NODE_OPTIONS: "--no-node-snapshot"
  LOG_LEVEL: debug
  POSTGRES_PORT: "5432"
  # https:// — TLS terminates at the ingress using the cert issued by the
  # local CA in deploy/tls-local. The browser uses these URLs, so they must
  # match the scheme and host actually served.
  APP_BASE_URL: "https://backstage.dev.local"
  BACKEND_BASE_URL: "https://backstage.dev.local"
ingress:
  enabled: true
  hosts:
    - host: backstage.dev.local
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: backstage-tls   # created by cert-manager, see deploy/tls-local
      hosts:
        - backstage.dev.local
autoscaling:
  enabled: false
podDisruptionBudget:
  enabled: false
# Bring up an in-cluster Postgres for dev — no external DB needed.
postgres:
  enabled: true
  persistence:
    size: 2Gi
secrets:
  # Must match postgres.auth.password when using the in-cluster database.
  postgresPassword: "postgres"
  backendSecret: "dev-only-not-a-real-secret-please-rotate"
