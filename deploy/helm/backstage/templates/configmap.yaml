apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "backstage.fullname" . }}
  labels:
    {{- include "backstage.labels" . | nindent 4 }}
data:
  # Resolved from either the in-cluster Postgres or externalPostgres (RDS).
  POSTGRES_HOST: {{ include "backstage.postgresHost" . | quote }}
  POSTGRES_USER: {{ include "backstage.postgresUser" . | quote }}
  {{- range $key, $value := .Values.env }}
  {{ $key }}: {{ $value | quote }}
  {{- end }}
