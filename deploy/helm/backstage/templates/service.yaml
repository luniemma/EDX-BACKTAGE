apiVersion: v1
kind: Service
metadata:
  name: {{ include "backstage.fullname" . }}
  labels:
    {{- include "backstage.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "backstage.selectorLabels" . | nindent 4 }}
    # Without this, the selector (name + instance) also matches the Postgres
    # StatefulSet pods, which carry the same base labels + component: database.
    app.kubernetes.io/component: backstage
