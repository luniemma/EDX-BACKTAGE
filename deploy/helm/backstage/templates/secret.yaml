{{- if and .Values.secrets.create (not .Values.secrets.existingSecret) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "backstage.fullname" . }}
  labels:
    {{- include "backstage.labels" . | nindent 4 }}
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ required "secrets.postgresPassword is required when secrets.create=true" .Values.secrets.postgresPassword | quote }}
  BACKEND_SECRET: {{ required "secrets.backendSecret is required when secrets.create=true" .Values.secrets.backendSecret | quote }}
  {{- with .Values.secrets.githubToken }}
  GITHUB_TOKEN: {{ . | quote }}
  {{- end }}
{{- end }}
