# Default values for backend-api.
# Override per-environment with values-<env>.yaml.

replicaCount: 2

image:
  # Set to the `repository_url` output of the Terraform stack, e.g.
  #   123456789012.dkr.ecr.us-east-1.amazonaws.com/backend-api
  repository: 123456789012.dkr.ecr.us-east-1.amazonaws.com/backend-api
  tag: ""              # defaults to Chart.appVersion when empty
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  create: true
  automount: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: ["ALL"]

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

ingress:
  enabled: false
  className: nginx
  annotations: {}
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: api.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
    # - secretName: api-tls
    #   hosts: [api.example.com]

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: false
  minAvailable: 1

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []

# App environment (mounted as ConfigMap)
env:
  NODE_ENV: production
  PORT: "3000"
  LOG_LEVEL: info
  JWT_EXPIRES_IN: 7d
  BCRYPT_SALT_ROUNDS: "10"
  CORS_ORIGIN: "*"

# Secrets. Either provide values inline (chart creates the Secret)
# or point at an existing Secret managed elsewhere (ESO, sealed-secrets, etc).
secrets:
  create: true
  existingSecret: ""           # if set, chart will NOT create one; uses this Secret
  jwtSecret: "change-me-to-a-long-random-string"
  # If databaseUrl is empty AND postgres.enabled=true, DATABASE_URL is auto-built.
  databaseUrl: ""

# Prisma migrations run as an ArgoCD PreSync / Helm pre-install hook Job.
migrations:
  enabled: true
  # Extra env for the migration job (rarely needed)
  extraEnv: []

# Optional in-cluster Postgres for dev/preview environments only.
# For production, disable this and set secrets.databaseUrl (or use existingSecret).
postgres:
  enabled: false
  image:
    repository: postgres
    tag: "16-alpine"
  auth:
    username: postgres
    password: postgres
    database: appdb
  persistence:
    enabled: true
    size: 8Gi
    storageClass: ""
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 512Mi

# Health probe paths
probes:
  liveness:
    path: /health
    initialDelaySeconds: 15
    periodSeconds: 20
    timeoutSeconds: 3
    failureThreshold: 3
  readiness:
    path: /health
    initialDelaySeconds: 5
    periodSeconds: 10
    timeoutSeconds: 3
    failureThreshold: 3
