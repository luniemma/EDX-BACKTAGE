replicaCount: 3

image:
  tag: ""  # pin per-release via ArgoCD parameter override or a Git tag

env:
  NODE_ENV: production
  LOG_LEVEL: info
  CORS_ORIGIN: "https://app.example.com"

ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/proxy-body-size: 1m
  hosts:
    - host: api.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: api-example-com-tls
      hosts:
        - api.example.com

resources:
  requests:
    cpu: 250m
    memory: 256Mi
  limits:
    cpu: "1"
    memory: 1Gi

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: true
  minAvailable: 2

topologySpreadConstraints:
  - maxSkew: 1
    topologyKey: topology.kubernetes.io/zone
    whenUnsatisfiable: ScheduleAnyway
    labelSelector:
      matchLabels:
        app.kubernetes.io/name: backend-api

# Production: use managed Postgres and pull secrets from a Secret managed
# by ESO / Sealed Secrets / Vault, etc.
postgres:
  enabled: false

secrets:
  create: false
  existingSecret: backend-api-prod-secrets
