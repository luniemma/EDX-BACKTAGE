{{- if and .Values.secrets.create (not .Values.secrets.existingSecret) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "backend-api.fullname" . }}
  labels:
    {{- include "backend-api.labels" . | nindent 4 }}
type: Opaque
stringData:
  JWT_SECRET: {{ required "secrets.jwtSecret is required when secrets.create=true" .Values.secrets.jwtSecret | quote }}
  DATABASE_URL: {{ include "backend-api.databaseUrl" . | quote }}
{{- end }}
