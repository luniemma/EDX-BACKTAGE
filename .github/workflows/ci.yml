name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  node:
    name: lint + typecheck + test
    runs-on: ubuntu-latest
    # Backstage's own tests run against an in-memory better-sqlite3 database,
    # so no Postgres service is needed here.
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn

      # Yarn 4 comes from .yarn/releases via corepack, pinned by packageManager
      # in package.json.
      - name: Enable corepack
        run: corepack enable

      - name: Install
        run: yarn install --immutable

      - name: Typecheck
        run: yarn tsc

      - name: Lint
        run: yarn lint:all

      - name: Test
        run: yarn test:all

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore

  helm:
    name: helm lint + template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.15.4
      - name: Helm lint
        run: helm lint deploy/helm/backstage
      - name: Helm template (dev)
        run: |
          helm template backstage deploy/helm/backstage \
            -f deploy/helm/backstage/values.yaml \
            -f deploy/helm/backstage/values-dev.yaml \
            > /tmp/rendered-dev.yaml
      # prod deliberately has no externalPostgres.host committed, and the chart
      # fails fast when neither that nor the in-cluster Postgres is set — so
      # supply a throwaway host to render it.
      - name: Helm template (prod)
        run: |
          helm template backstage deploy/helm/backstage \
            -f deploy/helm/backstage/values.yaml \
            -f deploy/helm/backstage/values-prod.yaml \
            --set image.tag=ci \
            --set secrets.create=true \
            --set secrets.postgresPassword=ci-not-a-real-password \
            --set secrets.backendSecret=ci-secret-that-is-long-enough-1234 \
            --set externalPostgres.host=postgres.ci.invalid \
            > /tmp/rendered-prod.yaml
      - name: Upload rendered manifests
        uses: actions/upload-artifact@v7
        with:
          name: helm-rendered
          path: /tmp/rendered-*.yaml

  docker-build:
    name: docker build (no push)
    runs-on: ubuntu-latest
    needs: [node]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (verify Dockerfile)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: backstage:ci
