name: ci

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  node:
    name: lint + typecheck + test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: appdb_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d appdb_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/appdb_test?schema=public
      JWT_SECRET: ci-secret-that-is-long-enough-1234
      NODE_ENV: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Typecheck (via build)
        run: npm run build

      - name: Test
        run: npm test -- --coverage

      - name: Upload coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore

  helm:
    name: helm lint + template
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: azure/setup-helm@v4
        with:
          version: v3.15.4
      - name: Helm lint
        run: helm lint deploy/helm/backend-api
      - name: Helm template (dev)
        run: |
          helm template backend-api deploy/helm/backend-api \
            -f deploy/helm/backend-api/values.yaml \
            -f deploy/helm/backend-api/values-dev.yaml \
            > /tmp/rendered-dev.yaml
      - name: Helm template (prod)
        run: |
          helm template backend-api deploy/helm/backend-api \
            -f deploy/helm/backend-api/values.yaml \
            -f deploy/helm/backend-api/values-prod.yaml \
            --set image.tag=ci \
            --set secrets.create=true \
            --set secrets.jwtSecret=ci-secret-that-is-long-enough-1234 \
            --set secrets.databaseUrl=postgresql://x:y@z:5432/db \
            > /tmp/rendered-prod.yaml
      - name: Upload rendered manifests
        uses: actions/upload-artifact@v4
        with:
          name: helm-rendered
          path: /tmp/rendered-*.yaml

  docker-build:
    name: docker build (no push)
    runs-on: ubuntu-latest
    needs: [node]
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image (verify Dockerfile)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          load: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
          tags: backend-api:ci
