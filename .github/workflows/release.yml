name: release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Semver tag to build (e.g. v1.2.3). Must already exist as a git tag."
        required: true

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write        # to open the prod-bump PR
  pull-requests: write
  id-token: write        # for OIDC federation with AWS

env:
  AWS_REGION:     ${{ vars.AWS_REGION }}
  ECR_REGISTRY:   ${{ vars.ECR_REGISTRY }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}

jobs:
  build-and-push:
    name: build + push versioned image to ECR
    runs-on: ubuntu-latest
    outputs:
      version:      ${{ steps.version.outputs.version }}
      clean:        ${{ steps.version.outputs.clean }}
      image_digest: ${{ steps.push.outputs.digest }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.version || github.ref }}

      - name: Resolve version
        id: version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            V="${{ inputs.version }}"
          else
            V="${GITHUB_REF_NAME}"
          fi
          echo "version=${V}"          >> "$GITHUB_OUTPUT"
          echo "clean=${V#v}"          >> "$GITHUB_OUTPUT"
          echo "Building version ${V}"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_TO_ASSUME }}
          aws-region:     ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      # ECR with IMMUTABLE tags: only push the exact semver — do NOT push
      # `latest` / `1` / `1.2` moving tags, they will be rejected. If you
      # switched the repo to MUTABLE, add them back here.
      - name: Compute image tags/labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}
          tags: |
            type=raw,value=${{ steps.version.outputs.clean }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.version=${{ steps.version.outputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push
        id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: true
          sbom: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  open-prod-pr:
    name: open PR to release/prod
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install yq
        uses: mikefarah/yq@v4.44.3

      - name: Bump values-prod.yaml image.tag
        env:
          CLEAN: ${{ needs.build-and-push.outputs.clean }}
        run: |
          yq -i ".image.tag = \"${CLEAN}\"" deploy/helm/backend-api/values-prod.yaml
          git diff -- deploy/helm/backend-api/values-prod.yaml || true

      - name: Create PR against release/prod
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          base: release/prod
          branch: chore/prod-bump-${{ needs.build-and-push.outputs.version }}
          delete-branch: true
          commit-message: "chore(prod): bump image.tag to ${{ needs.build-and-push.outputs.version }}"
          title: "Prod release ${{ needs.build-and-push.outputs.version }}"
          body: |
            Automated bump of `values-prod.yaml` image.tag to
            **${{ needs.build-and-push.outputs.clean }}**
            (git tag ${{ needs.build-and-push.outputs.version }}, digest `${{ needs.build-and-push.outputs.image_digest }}`).

            Merging this PR to `release/prod` triggers ArgoCD to roll out the release.
          labels: release,automated
