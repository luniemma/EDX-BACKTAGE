name: security

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    # Weekly full scan (Mondays 06:00 UTC) — catches newly disclosed CVEs
    # in dependencies that haven't changed but got worse.
    - cron: "0 6 * * 1"
  workflow_dispatch: {}

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Code scanning (SARIF upload + CodeQL) needs GitHub Advanced Security on a
# private repo, which this repo does not have — uploads 403 and fail the run.
# Findings are printed to the job log instead; the fail-on-CRITICAL gates below
# are what actually block. Re-add the CodeQL job and SARIF uploads if GHAS is
# ever enabled.
permissions:
  contents: read
  actions: read

jobs:
  npm-audit:
    name: npm audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --ignore-scripts
      - name: Audit production deps (high+)
        run: npm audit --omit=dev --audit-level=high
      - name: Audit all deps (informational)
        if: always()
        run: npm audit --audit-level=moderate || true

  trivy-fs:
    name: Trivy filesystem (deps + code)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trivy fs scan (informational)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          skip-dirs: node_modules,dist,coverage
          trivyignores: .trivyignore
      - name: Fail on findings
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          severity: CRITICAL
          exit-code: 1
          ignore-unfixed: true
          skip-dirs: node_modules,dist,coverage
          trivyignores: .trivyignore

  trivy-config:
    name: Trivy config (Dockerfile + Helm)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: v3.15.4

      - name: Render Helm chart for scanning
        run: |
          mkdir -p rendered
          helm template backend-api deploy/helm/backend-api \
            -f deploy/helm/backend-api/values.yaml \
            -f deploy/helm/backend-api/values-prod.yaml \
            --set image.tag=scan \
            --set secrets.create=true \
            --set secrets.jwtSecret=scan-secret-that-is-long-enough-1234 \
            --set secrets.databaseUrl=postgresql://x:y@z:5432/db \
            > rendered/all.yaml

      - name: Trivy config scan (Dockerfile + rendered manifests, informational)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: .
          format: table
          severity: CRITICAL,HIGH,MEDIUM
          skip-dirs: node_modules,dist,coverage
          trivyignores: .trivyignore
      - name: Fail on high+ misconfig
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          scan-ref: .
          severity: CRITICAL,HIGH
          exit-code: 1
          skip-dirs: node_modules,dist,coverage
          trivyignores: .trivyignore

  gitleaks:
    name: Gitleaks (secret scanning)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Uncomment if you have a Gitleaks Pro license:
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        with:
          config-path: .gitleaks.toml
